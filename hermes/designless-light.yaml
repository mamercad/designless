  voice_status_bg: "#E8E4DF"
  selection_bg: "#DDD7D1"
  completion_menu_bg: "#FFFFFF"
  completion_menu_current_bg: "#E8E4DF"
  completion_menu_meta_bg: "#F4F0EB"
  completion_menu_meta_current_bg: "#DDD7D1"

spinner:
  waiting_faces:
    - "(dl)"
    - "(· )"
    - "( ·)"
    - "(··)"
  thinking_faces:
    - "(dl)"
    - "(//)"
    - "(-- )"
    - "( --)"
  thinking_verbs:
    - "reducing noise"
    - "holding structure"
    - "shaping the system"
    - "tracing the edge"
    - "keeping it minimal"
    - "warming the monochrome"
  wings:
    - ["⟪#", "#⟫"]
    - ["⟪·", "·⟫"]
    - ["⟪/", "/⟫"]

branding:
  agent_name: "Hermes Agent"
  welcome: "Welcome to Hermes Agent — Designless Light. Type your message or /help for commands."
  goodbye: "Goodbye. ▌"
  response_label: " ▌ Hermes "
  prompt_symbol: "▌"
  help_header: "▌ Available Commands"

tool_prefix: "│"

tool_emojis:
  terminal: "▣"
  read_file: "▤"
  write_file: "▥"
  patch: "▨"
  search_files: "⌕"
  web_search: "◌"
  browser_navigate: "◇"
  computer_use: "▧"

