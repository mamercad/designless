name: Validate

on:
  push:
    branches: [main]
    paths:
      - "vscode/**"
      - ".github/workflows/validate.yml"
  pull_request:
    paths:
      - "vscode/**"
      - ".github/workflows/validate.yml"

jobs:
  validate-vscode-theme:
    runs-on: ubuntu-latest
    name: Validate VS Code Theme
    defaults:
      run:
        working-directory: ./vscode
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "vscode/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Validate theme definitions
        run: npm run validate

      - name: Check theme files exist
        run: |
          test -f themes/designless-light-color-theme.json || (echo "Missing light theme"; exit 1)
          test -f themes/designless-dark-color-theme.json || (echo "Missing dark theme"; exit 1)
          echo "✓ All theme files present"
